name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS aarch64
            runner: macos-latest
          - name: Linux aarch64
            runner: ubuntu-24.04-arm
          - name: Linux x86_64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Test libghostty-vt-sys
        run: nix develop -c cargo test -p libghostty-vt-sys

      - name: Build ghostling_rs with dynamic linking
        run: nix develop -c cargo build -p ghostling_rs

      - name: Build ghostling_rs with static linking
        if: runner.os != 'Linux'
        run: nix develop -c cargo build -p ghostling_rs --features link-static

      - name: Build ghostling_rs with static linking via zig cc
        if: runner.os == 'Linux'
        run: nix develop -c ./scripts/cargo-zig-linker build -p ghostling_rs --features link-static

      - name: Verify Linux static build avoids libc++ runtime deps
        if: runner.os == 'Linux'
        run: |
          nix develop -c sh -c '
            readelf -d target/debug/ghostling_rs | grep NEEDED
            ! readelf -d target/debug/ghostling_rs | grep -Eq "libc\+\+|libc\+\+abi"
          '

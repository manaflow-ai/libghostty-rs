name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS aarch64
            runner: macos-latest
          - name: Linux aarch64
            runner: ubuntu-24.04-arm
          - name: Linux x86_64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build
        run: nix develop -c cargo build --workspace

      - name: Test
        run: nix develop -c cargo test --workspace --lib

  miri:
    name: Linux Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Miri sys tests
        run: nix develop .#miri -c cargo miri test -p libghostty-vt-sys --lib

      - name: Miri wrapper tests
        run: nix develop .#miri -c cargo miri test -p libghostty-vt --lib
